<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="background"></div>

    <div class="player">

        <!-- PORTADA -->

        <div class="cover">

            <img src="cover.jpg" id="cover" alt="Portada">

        </div>

        <!-- CONTENIDO -->

        <div class="content">

            <div class="top">

                <div class="titles">

                    <h1 id="title">Eternally</h1>

                    <p id="artist">TXT</p>

                </div>

                <canvas id="visualizer"></canvas>

            </div>

            <!-- BARRA -->

            <div class="progress-area">

                <span id="current">0:00</span>

                <div class="progress">

                    <div class="progress-fill"></div>

                    <div class="progress-dot"></div>

                </div>

                <span id="duration">0:00</span>

            </div>

            <!-- CONTROLES -->

            <div class="bottom">

                <div class="controls">

                    <!-- ANTERIOR -->

                    <button id="prev" aria-label="Anterior">

                        <svg viewBox="0 0 24 24">
                            <path d="M18 6v12l-8.5-6zM6 6h2v12H6z"/>
                        </svg>

                    </button>

                    <!-- PLAY -->

                    <button id="play" aria-label="Reproducir">

                        <svg id="playIcon" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>

                    </button>

                    <!-- SIGUIENTE -->

                    <button id="next" aria-label="Siguiente">

                        <svg viewBox="0 0 24 24">
                            <path d="M6 6v12l8.5-6zM16 6h2v12h-2z"/>
                        </svg>

                    </button>

                </div>

                <!-- VOLUMEN -->

                <div class="volume">

                    <svg viewBox="0 0 24 24">
                        <path d="M5 9v6h4l5 5V4L9 9H5z"/>
                    </svg>

                    <input
                        id="volume"
                        type="range"
                        min="0"
                        max="100"
                        value="100">

                </div>

            </div>

        </div>

    </div>

    <audio id="audio" src="song.mp3"></audio>

    <script src="script.js"></script>

</body>

</html>
