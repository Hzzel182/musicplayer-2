<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Noctis Player</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<main class="player">

    <div class="glow"></div>

    <!-- =========================
         COVER
    ========================== -->

    <section class="album">

        <img
            id="cover"
            src="cover.jpg"
            alt="Album Cover">

    </section>

    <!-- =========================
         INFO
    ========================== -->

    <section class="info">

        <header class="song">

            <div>

                <h1 id="title">Eternally</h1>

                <h2 id="artist">Tomorrow X Together</h2>

            </div>

            <div class="status">

                <span class="live-dot"></span>

                <span>PLAYING</span>

            </div>

        </header>

        <!-- VISUALIZER -->

        <canvas id="visualizer"></canvas>

        <!-- PROGRESS -->

        <section class="timeline">

            <span id="currentTime">

                0:00

            </span>

            <div class="seekbar">

                <div class="seek-fill"></div>

                <div class="seek-thumb"></div>

            </div>

            <span id="totalTime">

                0:00

            </span>

        </section>

        <!-- CONTROLS -->

        <footer class="controls">

            <button id="prev">

                <svg viewBox="0 0 24 24">

                    <path d="M18 6v12l-8-6zM6 6h2v12H6z"/>

                </svg>

            </button>

            <button id="play">

                <svg id="playIcon" viewBox="0 0 24 24">

                    <path d="M8 5v14l11-7z"/>

                </svg>

            </button>

            <button id="next">

                <svg viewBox="0 0 24 24">

                    <path d="M6 6v12l8-6zM16 6h2v12h-2z"/>

                </svg>

            </button>

            <div class="volume">

                <svg viewBox="0 0 24 24">

                    <path d="M5 9v6h4l5 5V4L9 9H5z"/>

                </svg>

                <input
                    id="volume"
                    type="range"
                    min="0"
                    max="100"
                    value="100">

            </div>

        </footer>

    </section>

</main>

<audio
    id="audio"
    src="song.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
