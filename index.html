<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Music Player</title>
<link rel="stylesheet" href="style.css">
</head><body>
<div class="bg" id="bg"></div>
<div class="player">
<img id="cover" class="cover" alt="">
<div class="info"><h1 id="title"></h1><p id="artist"></p></div>
<audio id="audio"></audio>
<button id="play">▶</button>
<div class="time"><span id="cur">0:00</span><input id="seek" type="range" min="0" max="100" value="0"><span id="dur">0:00</span></div>
<input id="vol" type="range" min="0" max="1" step="0.01" value="1">
</div>
<script src="script.js"></script>
</body></html>
