<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Premium Music Player</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="background"></div>

<div class="player">

<div class="glass">

<!-- PORTADA -->

<div class="cover">

<img
id="cover"
src="cover.jpg"
alt="cover">

</div>

<!-- INFORMACIÓN -->

<div class="content">

<div class="header">

<h1 id="title">

Eternally

</h1>

<p id="artist">

TXT

</p>

</div>

<div class="visualizer">

<span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>

</div>

<div class="progress">

<span id="current">

0:00

</span>

<div id="progressBar">

<div id="progressFill"></div>

<div id="progressThumb"></div>

</div>

<span id="duration">

0:00

</span>

</div>

<div class="controls">

<button id="previous">

◀◀

</button>

<button id="play">

▶

</button>

<button id="next">

▶▶

</button>

</div>

</div>

</div>

</div>

<audio
id="audio"
preload="metadata">

<source
src="song.mp3"
type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>

</html>
