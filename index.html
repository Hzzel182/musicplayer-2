<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Premium Music Player</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- Fondo -->

    <div class="background">

        <div class="background-image"></div>

        <div class="background-gradient"></div>

    </div>

    <!-- PLAYER -->

    <main class="player">

        <div class="glass">

            <!-- PORTADA -->

            <section class="cover-section">

                <div class="cover-ring">

                    <img
                        id="cover"
                        src="cover.jpg"
                        alt="Cover">

                </div>

            </section>

            <!-- TITULO -->

            <section class="song-info">

                <h1 id="title">

                    Eternally

                </h1>

                <p id="artist">

                    TXT

                </p>

            </section>

            <!-- VISUALIZER -->

            <section class="visualizer">

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

                <span></span>

            </section>

            <!-- PROGRESO -->

            <section class="progress-wrapper">

                <span id="currentTime">

                    0:00

                </span>

                <div id="progressBar">

                    <div id="progress"></div>

                    <div id="progressThumb"></div>

                </div>

                <span id="duration">

                    0:00

                </span>

            </section>

            <!-- CONTROLES -->

            <section class="controls">

                <button
                    id="playButton">

                    <svg id="playIcon"
                         viewBox="0 0 24 24">

                        <path d="M8 5v14l11-7z"/>

                    </svg>

                </button>

            </section>

            <!-- VOLUMEN -->

            <section class="volume">

                <svg
                    viewBox="0 0 24 24">

                    <path d="M5 9v6h4l5 4V5L9 9H5z"/>

                </svg>

                <div id="volumeBar">

                    <div id="volumeProgress"></div>

                    <div id="volumeThumb"></div>

                </div>

            </section>

        </div>

    </main>

    <audio
        id="audio"
        preload="metadata">

        <source
            src="song.mp3"
            type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>

</html>
