<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noctis Player</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="player" id="player">

<div class="glow"></div>

<!-- COVER -->

<div class="cover">

<img id="cover" src="cover.jpg" alt="cover">

</div>

<!-- CONTENT -->

<div class="content">

<!-- TOP -->

<div class="top">

<div class="song">

<h1 id="title">Song</h1>

<p id="artist">Artist</p>

</div>

<div class="status">

<div class="dot"></div>

<span>PLAYING</span>

</div>

</div>

<!-- VISUALIZER -->

<div class="visualizer" id="visualizer">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<!-- TIMELINE -->

<div class="timeline">

<span id="currentTime">0:00</span>

<div class="seekbar" id="seekbar">

<div id="seekFill"></div>

<div id="seekThumb"></div>

</div>

<span id="duration">0:00</span>

</div>

<!-- CONTROLS -->

<div class="controls">

<div class="left-controls">

<button class="icon-button" id="prev" aria-label="Previous">

<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
<path d="M6 5h2v14H6zm3.5 7 8.5 7V5z"/>
</svg>

</button>

<button class="play-button" id="play" aria-label="Play">

<svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="#111">
<path d="M8 5v14l11-7z"/>
</svg>

</button>

<button class="icon-button" id="next" aria-label="Next">

<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
<path d="M16 5h2v14h-2zM6 19l8.5-7L6 5z"/>
</svg>

</button>

<button class="icon-button" id="loop" aria-label="Loop">

<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
<path d="M17 17H7v-2h10V12l4 4-4 4zm-10-8h10v2H7v3L3 10l4-4z"/>
</svg>

</button>

</div>

<div class="right-controls">

<span class="volume-icon">

<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
<path d="M5 9v6h4l5 5V4L9 9zm11.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/>
</svg>

</span>

<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

</div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
