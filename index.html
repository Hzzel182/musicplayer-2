<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noctis Player V5</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<main class="player">

    <div class="glow"></div>

    <!-- COVER -->

    <section class="cover">

        <img
            id="cover"
            src="cover.jpg"
            alt="Album Cover">

    </section>

    <!-- CONTENT -->

    <section class="content">

        <!-- TOP -->

        <header class="top">

            <div class="song">

                <h1 id="title">

                    Eternally

                </h1>

                <p id="artist">

                    Ji Pyoung Kwon

                </p>

            </div>

            <div class="status">

                <span class="dot"></span>

                <span>

                    PLAYING

                </span>

            </div>

        </header>

        <!-- VISUALIZER -->

        <section
            class="visualizer"
            id="visualizer">

            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>

        </section>

        <!-- TIMELINE -->

        <section class="timeline">

            <span id="currentTime">

                0:00

            </span>

            <div
                id="seekbar"
                class="seekbar">

                <div id="seekFill"></div>

                <div id="seekThumb"></div>

            </div>

            <span id="duration">

                0:00

            </span>

        </section>

        <!-- CONTROLS -->

        <section class="controls">

            <div class="left-controls">

                <button
                    id="prev"
                    class="icon-button"
                    title="Anterior">

                    ⏮

                </button>

                <button
                    id="play"
                    class="play-button"
                    title="Play">

                    ▶

                </button>

                <button
                    id="next"
                    class="icon-button"
                    title="Siguiente">

                    ⏭

                </button>

                <button
                    id="loop"
                    class="icon-button"
                    title="Repetir">

                    🔁

                </button>

            </div>

            <div class="right-controls">

                <span class="volume-icon">

                    🔊

                </span>

                <input
                    id="volume"
                    type="range"
                    min="0"
                    max="100"
                    value="100">

            </div>

        </section>

    </section>

</main>

<audio
    id="audio"
    preload="auto"
    playsinline>

    <source
        src="song.mp3"
        type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>

</html>
