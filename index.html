<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noctis Player V4</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="background-overlay"></div>

<main class="player">

    <div class="glow"></div>

    <section class="album">

        <img
            id="cover"
            src="cover.jpg"
            alt="Cover">

    </section>

    <section class="content">

        <header class="header">

            <div class="song">

                <h1 id="title">

                    Eternally

                </h1>

                <h2 id="artist">

                    Ji Pyoung Kwon

                </h2>

            </div>

            <div class="status">

                <span class="live-dot"></span>

                PLAYING

            </div>

        </header>

        <div
            class="visualizer"
            id="visualizer">

            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>

            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>

            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>

        </div>

        <section class="bottom">

            <section class="timeline">

                <span id="currentTime">

                    0:00

                </span>

                <div
                    class="seekbar"
                    id="seekbar">

                    <div id="seekFill"></div>

                    <div id="seekThumb"></div>

                </div>

                <span id="duration">

                    0:00

                </span>

            </section>

            <section class="controls">

                <div class="buttons">

                    <button id="prev">⏮</button>

                    <button id="play">▶</button>

                    <button id="next">⏭</button>

                </div>

                <div class="volume">

                    🔊

                    <input
                        id="volume"
                        type="range"
                        min="0"
                        max="100"
                        value="100">

                </div>

            </section>

        </section>

    </section>

</main>

<audio
    id="audio"
    preload="auto"
    playsinline>

    <source
        src="song.mp3"
        type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>

</html>
