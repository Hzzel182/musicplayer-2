<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternally - Ji Pyoung Kwon</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="player-widget">
        <div class="cover-container">
            <img src="cover.jpg" alt="Cover Eternally" id="cover">
        </div>
        <div class="info-container">
            <div class="song-meta">
                <span class="song-title">Eternally</span>
                <span class="artist-name">Ji Pyoung Kwon</span>
            </div>
            <div class="controls">
                <button id="play-pause-btn" title="Play/Pause">
                    <i class="fa-solid fa-play" id="play-icon"></i>
                </button>
                <button id="repeat-btn" title="Repetir">
                    <i class="fa-solid fa-repeat" id="repeat-icon"></i>
                </button>
            </div>
        </div>
        <audio id="audio" src="song.mp3" autoplay loop></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
